services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    expose:
      - "9000"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.29-alpine
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "${APP_PORT:-8001}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - "5432"
    ports:
      - "${DB_FORWARD_PORT:-5401}:5432"
    volumes:
      - cpe_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpe -d cpe"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cpe_postgres_data:
